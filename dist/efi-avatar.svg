<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="efiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF"/>
      <stop offset="100%" style="stop-color:#00D492"/>
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#efiGradient)"/>
  
  <!-- Robot face -->
  <g fill="white">
    <!-- Eyes -->
    <circle cx="32" cy="40" r="8"/>
    <circle cx="68" cy="40" r="8"/>
    
    <!-- Smile -->
    <path d="M30 60 Q50 72 70 60" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Antenna -->
    <line x1="50" y1="15" x2="50" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="5" r="3" fill="white"/>
  </g>
  
  <!-- Circuit lines (decorative) -->
  <g stroke="white" stroke-width="1.5" opacity="0.4" fill="none" stroke-linecap="round">
    <path d="M15 50 L25 50"/>
    <path d="M75 50 L85 50"/>
    <path d="M20 35 L28 38"/>
    <path d="M80 35 L72 38"/>
    <path d="M20 65 L28 62"/>
    <path d="M80 65 L72 62"/>
  </g>
</svg>
